<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
        content="Predict your Uber fare in New York City instantly. Click your pickup and dropoff locations on the map.">
  <title>Uber Fare Predictor · NYC</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

  <!-- App CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ═══════════════════════ HEADER ═══════════════════════ -->
<header class="header">
  <div class="header__inner">
    <div class="header__logo">
      <span class="header__icon">🚕</span>
      <span class="header__title">NYC Fare Predictor</span>
    </div>
    <p class="header__sub">Powered by CatBoost · OpenStreetMap</p>
  </div>
</header>

<!-- ═══════════════════════ MAIN ════════════════════════ -->
<main class="layout">

  <!-- ── Left panel – form ────────────────────────────── -->
  <section class="panel panel--form" aria-label="Fare prediction form">

    <!-- Step indicator -->
    <div class="steps">
      <div class="step" id="step-pickup">
        <div class="step__dot step__dot--active">1</div>
        <span class="step__label">Click <b>Pickup</b></span>
      </div>
      <div class="step__line"></div>
      <div class="step" id="step-dropoff">
        <div class="step__dot">2</div>
        <span class="step__label">Click <b>Dropoff</b></span>
      </div>
      <div class="step__line"></div>
      <div class="step" id="step-predict">
        <div class="step__dot">3</div>
        <span class="step__label">Get <b>Fare</b></span>
      </div>
    </div>

    <form id="fare-form" method="POST" action="/predict" novalidate>

      <!-- Hidden coordinate fields -->
      <input type="hidden" id="pickup_latitude"   name="pickup_latitude"   required>
      <input type="hidden" id="pickup_longitude"  name="pickup_longitude"  required>
      <input type="hidden" id="dropoff_latitude"  name="dropoff_latitude"  required>
      <input type="hidden" id="dropoff_longitude" name="dropoff_longitude" required>

      <!-- Location info display -->
      <div class="location-cards">
        <div class="loc-card loc-card--pickup" id="pickup-card">
          <span class="loc-card__icon">📍</span>
          <div>
            <div class="loc-card__label">Pickup</div>
            <div class="loc-card__val" id="pickup-display">Click the map →</div>
          </div>
        </div>
        <div class="loc-card loc-card--dropoff" id="dropoff-card">
          <span class="loc-card__icon">🏁</span>
          <div>
            <div class="loc-card__label">Dropoff</div>
            <div class="loc-card__val" id="dropoff-display">Click the map →</div>
          </div>
        </div>
      </div>

      <!-- ── Datetime ── -->
      <div class="field-group">
        <label class="field-label" for="pickup_datetime">
          <span class="field-icon">🕒</span> Pickup Date &amp; Time
        </label>
        <!-- Restrict input to the training period (2009-2015) -->
        <input class="field-input" type="datetime-local"
               id="pickup_datetime" name="pickup_datetime" 
               min="2009-01-01T00:00" max="2015-12-31T23:59" required>
      </div>

      <!-- ── Two-column row ── -->
      <div class="field-row">
        <div class="field-group">
          <label class="field-label" for="passenger_count">
            <span class="field-icon">👥</span> Passengers
          </label>
          <select class="field-input" id="passenger_count" name="passenger_count" required>
            <option value="1" selected>1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label" for="weather">
            <span class="field-icon">🌤</span> Weather
          </label>
          <select class="field-input" id="weather" name="weather" required>
            <option value="sunny"  selected>Sunny</option>
            <option value="cloudy">Cloudy</option>
            <option value="windy" >Windy</option>
            <option value="stormy">Stormy</option>
          </select>
        </div>
      </div>

      <!-- ── Two-column row ── -->
      <div class="field-row">
        <div class="field-group">
          <label class="field-label" for="car_condition">
            <span class="field-icon">🚗</span> Car Condition
          </label>
          <select class="field-input" id="car_condition" name="car_condition" required>
            <option value="Bad"      >Bad</option>
            <option value="Good"     selected>Good</option>
            <option value="Very Good">Very Good</option>
            <option value="Excellent">Excellent</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label" for="traffic_condition">
            <span class="field-icon">🚦</span> Traffic
          </label>
          <select class="field-input" id="traffic_condition" name="traffic_condition" required>
            <option value="Flow Traffic"      selected>Flow</option>
            <option value="Dense Traffic"           >Dense</option>
            <option value="Congested Traffic"       >Congested</option>
          </select>
        </div>
      </div>

      <!-- Error banner -->
      <div class="error-banner" id="error-banner" role="alert" hidden>
        <span id="error-text"></span>
      </div>

      <!-- Submit -->
      <button class="btn-predict" id="predict-btn" type="submit" disabled>
        <span class="btn-predict__icon">⚡</span>
        <span class="btn-predict__text">Predict Fare</span>
      </button>

      <!-- ── Inline result ── -->
      <div class="result-inline" id="result-box" hidden>
        <div class="result-inline__label">Estimated Fare</div>
        <div class="result-inline__amount" id="fare-amount">$0.00</div>
        <button class="result-inline__again" type="button"
                onclick="document.getElementById('reset-btn').click()">
          ↩ New Prediction
        </button>
      </div>

    </form>
  </section>

  <!-- ── Right panel – map ──────────────────────────────── -->
  <section class="panel panel--map" aria-label="Interactive NYC map">
    <div class="map-bar">
      <span class="map-bar__hint" id="map-hint">
        📍 Click anywhere in NYC to set your <b>Pickup</b> location
      </span>
      <button class="map-bar__reset" id="reset-btn" title="Clear markers" hidden>✕ Reset</button>
    </div>
    <div id="map"></div>
  </section>

</main>

<!-- ═══════════════════════ LOADING OVERLAY ══════════════ -->
<div class="overlay" id="overlay" hidden style="display:none">
  <div class="spinner"></div>
  <p class="overlay__text">Calculating fare…</p>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- App JS -->
<script src="{{ url_for('static', filename='map.js') }}"></script>
</body>
</html>
